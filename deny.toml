# deny.toml — cargo-deny v0.19 configuration for Rift Terminal V2
# L8 audit item: license allowlist + RustSec advisory gate.
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
# Exclude dev-only dependencies from all checks.
exclude-dev = true

# ── Advisories ────────────────────────────────────────────────────────
# Uses the RustSec advisory database (fetched automatically).
# Default behavior: deny known vulnerabilities, warn on yanked/unmaintained.
[advisories]
ignore = []

# ── Licenses ──────────────────────────────────────────────────────────
[licenses]
confidence-threshold = 0.8

# Allow common permissive licenses for third-party deps.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "0BSD",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "MPL-2.0",
    "OpenSSL",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
]

# Per-crate license exceptions (crates whose licenses aren't in the
# global allowlist but are acceptable for this project).
exceptions = []

# ring uses a non-standard LICENSE file — clarify its license expression
# so cargo-deny can verify it.
[[licenses.clarify]]
crate = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[licenses.private]
# Workspace crates use "Proprietary" (not an SPDX identifier).
# ignore = true skips license checks for unpublished workspace crates.
ignore = true
registries = []
