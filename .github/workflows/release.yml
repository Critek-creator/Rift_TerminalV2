name: Release

on:
  push:
    tags:
      - 'v*'

# tauri-action calls the GitHub Releases API to create the draft release
# and upload assets. The default GITHUB_TOKEN doesn't have write access to
# Contents (and therefore can't create releases) unless we ask for it here.
permissions:
  contents: write

jobs:
  release:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      # generate_context!() panics at compile time if dist/ doesn't exist;
      # build the frontend first so all cargo steps that follow have it on disk.
      - name: Build frontend
        run: npm run build

      # Windows code-signing stub — only runs when the certificate secret is
      # set in the repo. Workflow continues with an unsigned MSI if absent.
      - name: Decode Windows signing certificate
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE_BASE64 != ''
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
        shell: pwsh
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)
          $certPath  = Join-Path $env:RUNNER_TEMP "rift_signing.pfx"
          [IO.File]::WriteAllBytes($certPath, $certBytes)
          Write-Output "WINDOWS_SIGNING_CERT_PATH=$certPath" >> $env:GITHUB_ENV
          Write-Host "Certificate decoded to $certPath"

      - name: Build and publish Tauri release
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Rift Terminal v__VERSION__'
          releaseBody: 'See CHANGELOG.md for release notes.'
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true

  # tauri-action@v0 generates .sig files but cleans them up before
  # subsequent steps can access them. This dedicated job downloads the
  # release binaries, signs them fresh using the Tauri CLI, and uploads
  # latest.json with embedded signatures.
  updater-json:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Sign release artifacts and generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          repo="${GITHUB_REPOSITORY}"
          base="https://github.com/${repo}/releases/download/${tag}"

          mkdir -p /tmp/rift-sign
          platforms="{}"

          # Windows NSIS (.exe)
          exe_name=$(gh release view "$tag" --repo "$repo" --json assets \
            --jq '[.assets[] | select(.name | endswith("-setup.exe"))][0].name')
          if [ -n "$exe_name" ] && [ "$exe_name" != "null" ]; then
            echo "Signing $exe_name..."
            gh release download "$tag" --repo "$repo" --pattern "$exe_name" --dir /tmp/rift-sign
            npx --yes @tauri-apps/cli@latest signer sign "/tmp/rift-sign/$exe_name"
            win_sig=$(cat "/tmp/rift-sign/${exe_name}.sig")
            platforms=$(echo "$platforms" | jq \
              --arg url "$base/$exe_name" --arg sig "$win_sig" \
              '. + {"windows-x86_64": {"url": $url, "signature": $sig}}')
          fi

          # Linux AppImage
          appimage_name=$(gh release view "$tag" --repo "$repo" --json assets \
            --jq '[.assets[] | select(.name | endswith(".AppImage"))][0].name')
          if [ -n "$appimage_name" ] && [ "$appimage_name" != "null" ]; then
            echo "Signing $appimage_name..."
            gh release download "$tag" --repo "$repo" --pattern "$appimage_name" --dir /tmp/rift-sign
            npx --yes @tauri-apps/cli@latest signer sign "/tmp/rift-sign/$appimage_name"
            linux_sig=$(cat "/tmp/rift-sign/${appimage_name}.sig")
            platforms=$(echo "$platforms" | jq \
              --arg url "$base/$appimage_name" --arg sig "$linux_sig" \
              '. + {"linux-x86_64": {"url": $url, "signature": $sig}}')
          fi

          # macOS (.app.tar.gz) — built on macos-latest (Apple Silicon, so the
          # bundle is arm64 → keyed darwin-aarch64). Intel Macs are NOT covered:
          # the matrix builds a single arm64 bundle, and serving it under
          # darwin-x86_64 would hand an Intel Mac an arm binary that can't
          # launch. To cover Intel, add an x86_64-apple-darwin build target and
          # a matching darwin-x86_64 entry here.
          macos_name=$(gh release view "$tag" --repo "$repo" --json assets \
            --jq '[.assets[] | select(.name | endswith(".app.tar.gz"))][0].name')
          if [ -n "$macos_name" ] && [ "$macos_name" != "null" ]; then
            echo "Signing $macos_name..."
            gh release download "$tag" --repo "$repo" --pattern "$macos_name" --dir /tmp/rift-sign
            npx --yes @tauri-apps/cli@latest signer sign "/tmp/rift-sign/$macos_name"
            macos_sig=$(cat "/tmp/rift-sign/${macos_name}.sig")
            platforms=$(echo "$platforms" | jq \
              --arg url "$base/$macos_name" --arg sig "$macos_sig" \
              '. + {"darwin-aarch64": {"url": $url, "signature": $sig}}')
          fi

          count=$(echo "$platforms" | jq 'length')
          if [ "$count" -gt 0 ]; then
            now=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
            jq -n --arg v "$version" --arg d "$now" --argjson p "$platforms" \
              '{version: $v, notes: "See CHANGELOG.md for release notes.", pub_date: $d, platforms: $p}' \
              > /tmp/rift-sign/latest.json
            echo "Generated latest.json:"
            cat /tmp/rift-sign/latest.json
            gh release upload "$tag" /tmp/rift-sign/latest.json --repo "$repo" --clobber
            echo "latest.json uploaded successfully"
          else
            echo "::error::No signable artifacts found on release"
            exit 1
          fi

  publish:
    needs: updater-json
    runs-on: ubuntu-latest
    steps:
      - name: Publish release (remove draft flag)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.ref_name }}" --repo "${{ github.repository }}" --draft=false
