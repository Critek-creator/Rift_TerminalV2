name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      # Tauri's `generate_context!()` proc-macro reads `frontendDist` from
      # tauri.conf.json (= "../dist") at COMPILE TIME and panics if the path
      # doesn't exist. cargo clippy / build / test all trigger the macro, so
      # the frontend bundle must be built before any cargo step that links
      # the rift binary crate. Locally `tauri dev` invokes
      # `beforeDevCommand: "npm run dev"` for live serving, but CI doesn't
      # spawn the dev binary — we just need a static dist/ on disk.
      - name: Build frontend (produces dist/ for tauri::generate_context!)
        run: npm run build

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace --locked

      - name: cargo test
        run: cargo test --workspace --locked

      # D-014 — explicit gate so CI failure attribution is unambiguous when
      # rift-mcp regresses. Redundant with the --workspace step above (which
      # already covers it), but the named step is the audit-trail surface.
      - name: rift-mcp build + test (D-014)
        run: |
          cargo build -p rift-mcp --locked
          cargo test -p rift-mcp --locked

      - name: svelte-check
        run: npm run check

      - name: vitest (frontend unit tests)
        run: npm test

      # NOTICED (audit H12): this step uses `bash` explicitly. On windows-latest,
      # GitHub-hosted runners ship Git for Windows which puts bash in PATH — this
      # works today. If the runner image ever changes, this step will be the first
      # to break. A dedicated Windows-native rewrite of the boundary check is a
      # separate audit item (H12) out of scope for B3.
      - name: Translator boundary check (§9)
        run: bash tools/check-translator-boundary.sh

      # L7 — Detect unused dependencies. Runs after build so compiled
      # metadata is available. False positives suppressed via
      # [package.metadata.cargo-machete] in per-crate Cargo.toml.
      - name: cargo machete (unused deps)
        run: |
          cargo install cargo-machete --locked
          cargo machete

      # L8 — License + advisory audit. deny.toml lives in workspace root.
      # Checks licenses against allowlist and crates against RustSec DB.
      # --warn unmaintained: transitive unmaintained deps (GTK3 bindings,
      # proc-macro-error, unic-*) are Tauri's concern, not ours — warn
      # but don't block. Actual vulnerabilities still fail the gate.
      - name: cargo deny (license + advisory)
        if: matrix.os == 'ubuntu-latest'
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          arguments: --warn unmaintained

      # M13 — Verify public clones can build without the private aegis
      # feature. rift-aegis is in workspace members (stub tracked in git)
      # but the aegis feature on src-tauri is off by default, so the
      # private_modules code never compiles. This step ensures the
      # default-features path stays green for forks / public CI.
      - name: Public-clone build verification (M13)
        run: |
          echo "::group::workspace build (no aegis feature)"
          cargo build --workspace --locked
          echo "::endgroup::"
          echo "::group::src-tauri build (no aegis feature)"
          cd src-tauri && cargo build --locked
          echo "::endgroup::"
