name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Tauri system dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libsoup-3.0-dev \
            libxdo-dev \
            libssl-dev

      - name: Install npm dependencies
        run: npm ci

      # Tauri's `generate_context!()` proc-macro reads `frontendDist` from
      # tauri.conf.json (= "../dist") at COMPILE TIME and panics if the path
      # doesn't exist. cargo clippy / build / test all trigger the macro, so
      # the frontend bundle must be built before any cargo step that links
      # the rift binary crate. Locally `tauri dev` invokes
      # `beforeDevCommand: "npm run dev"` for live serving, but CI doesn't
      # spawn the dev binary — we just need a static dist/ on disk.
      - name: Build frontend (produces dist/ for tauri::generate_context!)
        run: npm run build

      - name: cargo fmt --check
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo build
        run: cargo build --workspace --locked

      - name: cargo test
        run: cargo test --workspace --locked

      - name: svelte-check
        run: npm run check

      - name: vitest (frontend unit tests)
        run: npm test

      # NOTICED (audit H12): this step uses `bash` explicitly. On windows-latest,
      # GitHub-hosted runners ship Git for Windows which puts bash in PATH — this
      # works today. If the runner image ever changes, this step will be the first
      # to break. A dedicated Windows-native rewrite of the boundary check is a
      # separate audit item (H12) out of scope for B3.
      - name: Translator boundary check (§9)
        run: bash tools/check-translator-boundary.sh
