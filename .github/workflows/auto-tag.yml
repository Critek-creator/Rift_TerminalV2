name: Auto-tag on version bump

on:
  push:
    branches: [main]
    paths:
      - 'package.json'

permissions:
  contents: write
  actions: write   # needed to dispatch release.yml via `gh workflow run`

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check for version bump and tag
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version=$(node -p "require('./package.json').version")
          tag="v${version}"

          # Check if this tag already exists (fetch remote tags since shallow clone misses them)
          git fetch --tags --quiet
          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists — skipping"
            exit 0
          fi

          # Verify package.json actually changed in this push
          if git diff HEAD~1 HEAD --name-only | grep -q '^package.json$'; then
            old_version=$(git show HEAD~1:package.json | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version" 2>/dev/null || echo "")
            if [ "$old_version" = "$version" ]; then
              echo "package.json changed but version unchanged ($version) — skipping"
              exit 0
            fi
            echo "Version bumped: ${old_version:-unknown} → $version"
          else
            echo "package.json not in changeset — skipping"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$tag" -m "Release $tag"
          git push origin "$tag"
          echo "Created and pushed tag $tag"

          # A tag pushed with GITHUB_TOKEN does NOT trigger release.yml's
          # `on: push: tags` — GitHub blocks workflow-token pushes from
          # starting new runs (recursion guard). workflow_dispatch is an
          # explicit exception, so dispatch the release workflow at the tag.
          # (release.yml reads github.ref_name, which resolves to "$tag" when
          # dispatched with --ref.)
          gh workflow run release.yml --ref "$tag"
          echo "Dispatched release.yml against $tag"
