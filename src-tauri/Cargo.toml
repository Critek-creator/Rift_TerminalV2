[package]
name = "rift"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
description = "Rift Terminal v2 — standalone terminal + GUI cockpit"
rust-version.workspace = true

[lib]
name = "rift_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[build-dependencies]
tauri-build = { workspace = true }

[dependencies]
tauri = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }
rift-bus = { path = "../crates/rift-bus" }
rift-core = { path = "../crates/rift-core" }
# Phase 7 — Aegis private translator (feature-gated optional path dep).
# IMPORTANT: optional=true gates COMPILATION of this dep, but does NOT
# prevent Cargo from reading the manifest at the path during workspace
# metadata resolution. So cargo build --workspace --locked WILL FAIL on
# a fresh public clone where crates/rift-aegis/ does not exist on disk.
# This is tracked as DEFERRED.md D-011 — fix path under planning. Local
# dev works because the gitignored crate is present. Do not push to
# origin/main until D-011 is resolved (it would turn CI red).
# See decision A in PHASE 7 PLAN (commit 749ec91) for the architecture.
rift-aegis = { path = "../crates/rift-aegis", optional = true }
globset = { workspace = true }
dunce = { workspace = true }

[features]
default = ["custom-protocol"]
custom-protocol = ["tauri/custom-protocol"]
# Phase 7 — Aegis private translator. Off by default; on when the
# gitignored crates/rift-aegis/ is present locally and dev runs
# `cargo build --features aegis`.
aegis = ["dep:rift-aegis"]
